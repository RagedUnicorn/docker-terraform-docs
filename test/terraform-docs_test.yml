schemaVersion: 2.0.0

fileExistenceTests:
  - name: 'terraform-docs binary exists'
    path: '/usr/local/bin/terraform-docs'
    shouldExist: true
    permissions: '-rwxr-xr-x'

  - name: 'Workspace directory exists'
    path: '/workspace'
    shouldExist: true
    permissions: 'drwxr-xr-x'

commandTests:
  - name: 'terraform-docs is executable'
    command: 'terraform-docs'
    args: ['--version']
    exitCode: 0

  - name: 'Working directory is set correctly'
    command: 'pwd'
    exitCode: 0
    expectedOutput:
      - '/workspace'
